<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <div class="content">
        <h1>Mia's Calculator</h1>
        <div class="text"></div>

        <div class="calc-container">

            <div class="display-outline">
                <div class="display">Input Here
                    <p></p>
                    <p></p>
                </div>
            </div>

            <div class="stripe">
                <button></button>
                <button></button>
                <button id="round-button"></button>
                <button></button>
                <button></button>
            </div>

            <div class="btn-layout">
                <div class="numbers">
                    <div class="row">
                        <button>7</button>
                        <button>8</button>
                        <button>9</button>
                    </div>
                    <div class="row">
                        <button>4</button>
                        <button>5</button>
                        <button>6</button>
                    </div>
                    <div class="row">
                        <button>1</button>
                        <button>2</button>
                        <button>3</button>
                    </div>
                </div>
                <div class="operators">
                    <div>
                        <button>+</button>
                        <button>-</button>
                    </div>
                    <div>
                        <button>*</button>
                        <button>/</button>
                    </div>
                    <button>=</button>
                </div>
            </div>            
        </div>
    </div>
</body>
</html>
