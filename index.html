<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./script.js" defer></script>
</head>
<body>
    <div class="content">
        <h1>Mia's Calculator</h1>
        <div class="text"></div>

        <div class="calc-container">

            <div class="display-outline">
                <div class="display">
                    <p id="input"> </p>
                    <p id="output">Output</p>
                </div>
            </div>

            <div class="stripe">
                <button></button>
                <button></button>
                <button id="round-button">clear</button>
                <button></button>
                <button></button>
            </div>

            <div class="btn-layout">
                <div class="numbers">
                    <div class="row">
                        <button class="num">7</button>
                        <button class="num">8</button>
                        <button class="num">9</button>
                    </div>
                    <div class="row">
                        <button class="num">4</button>
                        <button class="num">5</button>
                        <button class="num">6</button>
                    </div>
                    <div class="row">
                        <button class="num">1</button>
                        <button class="num">2</button>
                        <button class="num">3</button>
                    </div>
                    <div class="row">
                    <button></button>
                    <button class="num" id="zero">0</button>
                    <button></button>
                    </div>
                    
                </div>
                <div class="operators">
                    <div>
                        <button class="op">+</button>
                        <button class="op">-</button>
                    </div>
                    <div>
                        <button class="op">*</button>
                        <button class="op">/</button>
                    </div>
                    <button class="op">=</button>
                </div>
            </div>
            <div id="credits">
                <p>mia©</p>    
                <p>2026</p>    
            </div>    
        </div>
    </div>
</body>
</html>
